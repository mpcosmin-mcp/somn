name: Garmin Sleep Sync

on:
  schedule:
    # 07:00 UTC = 10:00 Europe/Bucharest (handles both EET and EEST,
    # GitHub Actions cron is always UTC). Garmin has finalized last
    # night's sleep score by then.
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      sync_date:
        description: "Optional date to sync (YYYY-MM-DD). Defaults to yesterday."
        required: false
        type: string
      dry_run:
        description: "Skip the write to the Sheet."
        required: false
        type: boolean
        default: false

concurrency:
  group: garmin-sync
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Run Garmin sync
        env:
          GARMIN_USERNAME: ${{ secrets.GARMIN_EMAIL || secrets.GARMIN_USERNAME }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          SHEETS_API_URL: ${{ secrets.SHEETS_API_URL }}
          SOMN_NAME: ${{ vars.SOMN_NAME }}
          SYNC_DATE: ${{ inputs.sync_date }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        run: python scripts/garmin_sync.py
